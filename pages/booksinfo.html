<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Livro - BookCentral</title>
    <!-- Utilizando o mesmo CSS base para manter a consistência -->
    <link rel="stylesheet" href="../assets/css/HomeCustom.css">
</head>
<body class="bg-white font-sans text-gray-900">

    <!-- Header -->
    <header class="border-b border-gray-200 py-6">
        <div class="container mx-auto px-4 h-16 flex items-center justify-between ">
            <a href="../home.html" class="text-2xl font-extrabold font-bold button-transparent uppercase">universe Tech<span class="text-blue-600">Geek</span></a>
            
            <nav class="hidden md:flex font-medium text-sm uppercase tracking-wide">
                <a href="books.html" class="text-sm font-bold button-transparent ">Books</a>
                <a href="games.html" class="text-sm font-bold button-transparent ">Games</a>
                <a href="movies.html" class="text-sm font-bold button-transparent ">Movies</a>
                <a href="music.html" class="text-sm font-bold button-transparent ">Music</a>
                <a href="tv.html" class="text-sm font-bold button-transparent ">TV Shows</a>
            </nav>

            <div class="flex items-center space-x-4">
                <div class="w-7 h-7 rounded-full bg-gray-200 wireframe-box text-xs">U</div>
                    <button class="md:hidden p-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto py-12 px-4">
        
        <div class="book-container">
            <!-- Capa do Livro -->
            <div class="book-cover wireframe-box shadow-2xl" id="book-cover-container">
                <span class="text-xl font-bold uppercase text-center p-4">[Capa do Livro]</span>
            </div>

            <!-- Informações Principais -->
            <div class="space-y-6">
                <div class="flex items-start justify-between flex-wrap gap-4">
                    <div>
                        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter" id="book-title">Carregando Título...</h1>
                        <p class="text-xl text-blue-600 font-bold mt-2" id="book-author">Autor</p>
                    </div>
                    <div class="rating-badge text-white" id="book-rating">-</div>
                </div>
                
                <p class="text-gray-600 text-lg leading-relaxed" id="book-short-description">
                    Carregando descrição curta...
                </p>

                

                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 info-grid py-12">
                    <div class="info-grid-item">
                        <span class="text-gray-500">Publisher</span>
                        <span class="font-bold " id="info-publisher">-</span>
                    </div>
                    <div class="info-grid-item">
                        <span class="text-gray-500">Idioma</span>
                        <span class="font-bold" id="info-language">-</span>
                    </div>
                    <div class="info-grid-item">
                        <span class="text-gray-500">Data de Publicação</span>
                        <span class="font-bold" id="info-date">-</span>
                    </div>
                    <div class="info-grid-item">
                        <span class="text-gray-500">Páginas</span>
                        <span class="font-bold" id="info-pages">-</span>
                    </div>
                    <div class="info-grid-item">
                        <span class="text-gray-500">Gênero</span>
                        <span class="font-bold" id="genre-tags">-</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sinopse e Detalhes Adicionais -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12 mt-20 py-13">

            <!-- Especificações Físicas -->
            <div>
                <div class="spec-card space-y-4">
                    <div class="text-sm">
                        <p class="text-gray-500 uppercase font-bold text-xs mb-1">ISBN-13</p>
                        <p class="font-bold" id="spec-isbn">-</p>
                    </div>
                    <div class="text-sm">
                        <p class="text-gray-500 uppercase font-bold text-xs mb-1">Dimensões</p>
                        <p class="font-bold" id="spec-dimensions">-</p>
                    </div>
                    <div class="text-sm">
                        <p class="text-gray-500 uppercase font-bold text-xs mb-1">Formato</p>
                        <p class="font-bold" id="spec-format">-</p>
                    </div>
                    <div class="text-sm">
                        <p class="text-gray-500 uppercase font-bold text-xs mb-1">Peso</p>
                        <p class="font-bold" id="spec-weight">-</p>
                    </div>
                
                </div>
            </div>
        </div>

        <div id="container-review-global"></div>

    </main>

    

    <footer class="bg-gray-100 mt-20 border-t border-gray-200 text-center">
        <div class="container mx-auto px-4">
            <p class="text-gray-500 text-sm">© 2026 BookCentral. Todos os direitos reservados.</p>
        </div>
    </footer>

    <!-- Script de integração -->
    <script src="../JS/bookinfo.js"></script>
    <script src="../JS/review.js"></script>
</body>
</html>
